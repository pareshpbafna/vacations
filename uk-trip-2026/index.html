<title>UK Trip 2026 — Bafna Family</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --text:#f0f0f0;--muted:#888;--accent:#e8c97c;
  --group:#7cb8e8;--pair:#a8d8a8;--solo:#e8c97c;--scenic:#c9a8e8;
  --radius:10px;--tr:0.22s ease;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.back{display:inline-flex;align-items:center;gap:.5rem;padding:1.2rem 2rem .5rem;color:var(--muted);font-size:.85rem;transition:var(--tr)}
.back:hover{color:var(--text)}
.back svg{width:14px;height:14px}
.header{padding:1rem 2rem 1.5rem;max-width:1400px;margin:0 auto}
.header h1{font-size:2rem;font-weight:600;letter-spacing:-.5px;color:#fff}
.header h1 span{color:var(--accent)}
.header p{color:var(--muted);margin-top:.4rem;font-size:.95rem}
.stats{display:flex;gap:1.5rem;margin-top:1.2rem;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.6rem 1rem}
.stat span{font-size:1.3rem;font-weight:600;color:#fff;display:block}
.stat small{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.controls{max-width:1400px;margin:0 auto;padding:0 2rem 1.5rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;flex:1}
.fb{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.45rem 1rem;border-radius:100px;font-size:.82rem;cursor:pointer;transition:var(--tr);white-space:nowrap}
.fb:hover{border-color:#555;color:var(--text)}
.fb.active{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:500}
.fb.active.tg{background:var(--group);border-color:var(--group);color:#0a1f2e}
.fb.active.tp{background:var(--pair);border-color:var(--pair);color:#0a1f0a}
.fb.active.ts{background:var(--solo);border-color:var(--solo);color:#1f160a}
.fb.active.tn{background:var(--scenic);border-color:var(--scenic);color:#1a0a2e}
.day-bar{display:flex;gap:.4rem;flex-wrap:wrap;max-width:1400px;margin:0 auto;padding:0 2rem 1.5rem}
.db{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.35rem .75rem;border-radius:6px;font-size:.78rem;cursor:pointer;transition:var(--tr)}
.db:hover{border-color:#555;color:var(--text)}
.db.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.sw{position:relative}
.sw input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.45rem .9rem .45rem 2.2rem;border-radius:100px;font-size:.82rem;width:180px;outline:none;transition:var(--tr)}
.sw input:focus{border-color:#555;width:220px}
.sw::before{content:"⌕";position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none}
.cl{color:var(--muted);font-size:.82rem;align-self:center;white-space:nowrap}
.grid-wrap{max-width:1400px;margin:0 auto;padding:0 2rem 4rem}
.grid{columns:4 200px;column-gap:10px}
.gi{break-inside:avoid;margin-bottom:10px;position:relative;cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.gi img{width:100%;display:block;transition:transform .35s ease,opacity .3s;opacity:0}
.gi img.ok{opacity:1}
.gi:hover img{transform:scale(1.035)}
.ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 50%);opacity:0;transition:var(--tr);display:flex;align-items:flex-end;padding:.75rem}
.gi:hover .ov{opacity:1}
.om{display:flex;gap:.4rem;align-items:center}
.td{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.td.group{background:var(--group)}.td.pair{background:var(--pair)}.td.solo{background:var(--solo)}.td.scenic{background:var(--scenic)}
.od{font-size:.72rem;color:rgba(255,255,255,.8)}
.gi.hidden{display:none}
.dh{break-inside:avoid;margin-bottom:10px;padding:.5rem .2rem}
.dh h3{font-size:.78rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);padding-bottom:.4rem}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-iw{max-width:92vw;max-height:85vh;display:flex;align-items:center;justify-content:center}
.lb img{max-width:92vw;max-height:85vh;object-fit:contain;border-radius:6px}
.lbc{position:fixed;top:1.2rem;right:1.4rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.lbc:hover{background:rgba(255,255,255,.2)}
.lbn{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.lbn:hover{background:rgba(255,255,255,.22)}
.lbpv{left:1rem}.lbnx{right:1rem}
.lbca{margin-top:1rem;text-align:center}
.lbd{color:var(--muted);font-size:.85rem;margin-top:.2rem}
.lbb{display:inline-block;padding:.2rem .7rem;border-radius:100px;font-size:.72rem;font-weight:500}
.lbb.group{background:rgba(124,184,232,.2);color:var(--group)}.lbb.pair{background:rgba(168,216,168,.2);color:var(--pair)}
.lbb.solo{background:rgba(232,201,124,.2);color:var(--solo)}.lbb.scenic{background:rgba(201,168,232,.2);color:var(--scenic)}
.lbcnt{color:var(--muted);font-size:.8rem;margin-top:.4rem}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
</style>
</head>

    img.addEventListener("load",()=>img.classList.add("ok"));
    img.addEventListener("error",()=>{img.classList.add("ok");img.style.minHeight="100px";});
    el.addEventListener("click",()=>oLB(i));
    grid.appendChild(el);gi.push({el,photo:p,idx:i});
  });
});
function af(){let v=0;const hs=document.querySelectorAll(".dh");const dc={};
  gi.forEach(({el,photo})=>{const ok=(aT==="all"||photo.type===aT)&&(aD==="all"||photo.date===aD)&&(!sQ||photo.date.includes(sQ)||fd(photo.date).toLowerCase().includes(sQ));
    el.classList.toggle("hidden",!ok);if(ok){v++;dc[photo.date]=(dc[photo.date]||0)+1;}});
  hs.forEach(h=>h.classList.toggle("hidden",!dc[h.dataset.day]));
  document.getElementById("cnt").textContent=v+" photo"+(v!==1?"s":"");
  document.getElementById("empty").style.display=v===0?"block":"none";}
document.querySelectorAll(".fb").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".fb").forEach(x=>x.classList.remove("active"));b.classList.add("active");aT=b.dataset.t;af();}));
db.addEventListener("click",e=>{const b=e.target.closest(".db");if(!b)return;document.querySelectorAll(".db").forEach(x=>x.classList.remove("active"));b.classList.add("active");aD=b.dataset.d;af();});
document.getElementById("srch").addEventListener("input",e=>{sQ=e.target.value.trim().toLowerCase();af();});
const lb=document.getElementById("lb");const lbi=document.getElementById("lbi");let li=0;
function vp(){return gi.filter(({el})=>!el.classList.contains("hidden")).map(({photo,idx})=>({photo,idx}));}
function oLB(idx){const v=vp();const pos=v.findIndex(x=>x.idx===idx);if(pos<0)return;li=pos;sLB(v);lb.classList.add("open");document.body.style.overflow="hidden";}
function sLB(v){if(!v)v=vp();const{photo}=v[li];lbi.src=F+photo.file;document.getElementById("lbb").textContent=TL[photo.type]||photo.type;document.getElementById("lbb").className="lbb "+photo.type;document.getElementById("lbd").textContent=fd(photo.date);document.getElementById("lbn2").textContent=(li+1)+" of "+v.length;}
function cLB(){lb.classList.remove("open");document.body.style.overflow="";}
document.getElementById("lbc").addEventListener("click",cLB);lb.addEventListener("click",e=>{if(e.target===lb)cLB();});
document.getElementById("lbp").addEventListener("click",()=>{const v=vp();li=(li-1+v.length)%v.length;sLB(v);});
document.getElementById("lbx").addEventListener("click",()=>{const v=vp();li=(li+1)%v.length;sLB(v);});
document.addEventListener("keydown",e=>{if(!lb.classList.contains("open"))return;const v=vp();if(e.key==="Escape")cLB();else if(e.key==="ArrowLeft"){li=(li-1+v.length)%v.length;sLB(v);}else if(e.key==="ArrowRight"){li=(li+1)%v.length;sLB(v);}});
let tx=null;
lb.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
lb.addEventListener("touchend",e=>{if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;const v=vp();if(Math.abs(dx)>50){li=dx<0?(li+1)%v.length:(li-1+v.length)%v.length;sLB(v);}tx=null;},{passive:true});
</script>
</body>
