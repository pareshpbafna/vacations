<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UK Trip 2026 — Bafna Family</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surf:#1a1a1a;--surf2:#242424;--bdr:#2e2e2e;--txt:#f0f0f0;--mut:#888;--acc:#e8c97c;--tr:.2s ease}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* header */
.hdr{max-width:1400px;margin:0 auto;padding:2rem 2rem 1rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.hdr-left h1{font-size:1.8rem;font-weight:600;color:#fff}
.hdr-left h1 span{color:var(--acc)}
.hdr-left p{color:var(--mut);font-size:.9rem;margin-top:.3rem}
.back-link{font-size:.8rem;color:var(--mut);display:flex;align-items:center;gap:.4rem;transition:var(--tr)}
.back-link:hover{color:var(--txt)}
.back-link svg{width:14px;height:14px}
.stats-row{max-width:1400px;margin:0 auto;padding:0 2rem 1.2rem;display:flex;gap:1rem;flex-wrap:wrap}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:.5rem .9rem}
.stat span{font-size:1.1rem;font-weight:600;color:#fff;display:block}
.stat small{font-size:.68rem;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}

/* controls */
.ctrl{max-width:1400px;margin:0 auto;padding:0 2rem 1rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.fb{background:var(--surf);border:1px solid var(--bdr);color:var(--mut);padding:.38rem .85rem;border-radius:100px;font-size:.78rem;cursor:pointer;transition:var(--tr);white-space:nowrap}
.fb:hover{border-color:#555;color:var(--txt)}
.fb.on{border-color:var(--acc);color:var(--acc);background:rgba(232,201,124,.08);font-weight:500}
.sep{width:1px;height:22px;background:var(--bdr)}
.srch-w{position:relative}
.srch-w input{background:var(--surf);border:1px solid var(--bdr);color:var(--txt);padding:.38rem .85rem .38rem 1.9rem;border-radius:100px;font-size:.78rem;width:160px;outline:none;transition:var(--tr)}
.srch-w input:focus{border-color:#555;width:200px}
.srch-w::before{content:"⌕";position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--mut);font-size:.9rem;pointer-events:none}
.cnt-lbl{font-size:.78rem;color:var(--mut);margin-left:auto}
.sz-btn{background:var(--surf);border:1px solid var(--bdr);color:var(--mut);padding:.3rem .7rem;border-radius:6px;font-size:.76rem;cursor:pointer;transition:var(--tr)}
.sz-btn.on{background:var(--surf2);border-color:var(--acc);color:var(--acc)}

/* grid */
.grid-wrap{max-width:1400px;margin:0 auto;padding:0 2rem 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;transition:grid-template-columns var(--tr)}
.grid.large{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.gi{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;cursor:pointer;background:var(--surf)}
.gi img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:transform .3s,opacity .25s}
.gi img.ok{opacity:1}
.gi:hover img{transform:scale(1.04)}
.gi-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),transparent 55%);opacity:0;transition:var(--tr);display:flex;flex-direction:column;justify-content:flex-end;padding:.6rem}
.gi:hover .gi-ov{opacity:1}
.gi-loc{font-size:.65rem;color:rgba(255,255,255,.9);line-height:1.3}
.gi-ppl{font-size:.6rem;color:var(--acc);margin-top:1px}
.gi-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.gi-tag{font-size:.55rem;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);padding:1px 5px;border-radius:100px}
.gi.hidden{display:none}
.gi-stars{position:absolute;top:5px;left:5px;font-size:.55rem;color:#fbbf24}
.gi-kb{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;background:#22c55e;color:#fff}
.empty-msg{padding:4rem;text-align:center;color:var(--mut)}

/* lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-wrap{position:relative;max-width:94vw;max-height:84vh;display:flex;align-items:center;justify-content:center}
.lb-wrap img{max-width:94vw;max-height:84vh;object-fit:contain;border-radius:6px}
.lb-close{position:fixed;top:1rem;right:1.2rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.lb-nav:hover{background:rgba(255,255,255,.2)}
#lb-prev{left:.8rem}#lb-next{right:.8rem}
.lb-info{margin-top:.9rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.3rem}
.lb-loc{font-size:.85rem;color:rgba(255,255,255,.9)}
.lb-meta{display:flex;gap:.8rem;align-items:center}
.lb-ppl{font-size:.75rem;color:var(--acc)}
.lb-date{font-size:.72rem;color:var(--mut)}
.lb-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.lb-tag{font-size:.68rem;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:2px 7px;border-radius:100px}
.lb-cnt{font-size:.7rem;color:var(--mut)}
.lb-cap{font-size:.78rem;color:rgba(255,255,255,.65);max-width:560px;line-height:1.5;font-style:italic}

/* loading state */
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--mut);z-index:500}
</style>
</head>
<body>

<div class="loading" id="loading">Loading photos…</div>

<div class="hdr">
  <div class="hdr-left">
    <h1>UK Trip 2026 <span>— Best Photos</span></h1>
    <p>Bafna family adventure across the UK · May 2026</p>
  </div>
  <a class="back-link" href="../">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
    All trips
  </a>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="ctrl" id="ctrl-people"></div>
<div class="ctrl" id="ctrl-location"></div>
<div class="ctrl" id="ctrl-tags"></div>

<div class="ctrl">
  <div class="sep"></div>
  <div class="srch-w"><input type="text" id="srch" placeholder="Search…" oninput="af()"></div>
  <span class="sz-btn on" id="sz-sm" onclick="setSize('sm')">⊞ Small</span>
  <span class="sz-btn" id="sz-lg" onclick="setSize('lg')">⊟ Large</span>
  <span class="cnt-lbl" id="cnt">— photos</span>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="empty-msg" id="empty-msg" style="display:none">No photos match your filters</div>
</div>

<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="navLB(-1)">‹</button>
  <div class="lb-wrap"><img id="lb-img" src="" alt="" onload="this.style.opacity=1" style="opacity:0;transition:opacity .3s"></div>
  <button class="lb-nav" id="lb-next" onclick="navLB(1)">›</button>
  <div class="lb-info">
    <div class="lb-loc" id="lb-loc"></div>
    <div class="lb-meta">
      <span class="lb-ppl" id="lb-ppl"></span>
      <span class="lb-date" id="lb-date"></span>
      <span class="lb-cnt" id="lb-cnt"></span>
    </div>
    <div class="lb-tags" id="lb-tags"></div>
    <div class="lb-cap" id="lb-cap"></div>
  </div>
</div>

const CITY_MAP = Object.fromEntries([["london", "\ud83c\udfd9\ufe0f London"], ["windsor", "\ud83c\udff0 Windsor"], ["bath", "\ud83d\udec1 Bath"], ["stonehenge", "\ud83d\uddff Stonehenge"], ["birmingham", "\ud83d\udd4c Birmingham"], ["lake", "\ud83c\udfd4\ufe0f Lake District"], ["edinburgh", "\ud83c\udfef Edinburgh"], ["scotland", "\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc73\udb40\udc63\udb40\udc74\udb40\udc7f Scotland"], ["inverness", "\ud83c\udf09 Inverness"], ["amsterdam", "\ud83c\uddf3\ud83c\uddf1 Amsterdam"], ["india", "\ud83c\uddee\ud83c\uddf3 India"], ["flight", "\u2708\ufe0f Flight"], ["train", "\ud83d\ude82 Train"]]);
const PPL = ['paresh','namrata','ansh','samyra'];

let tags = {};
let fState = {people:'all', city:'all', tag:'all', album:'all'};
let selIdx = 0;
let gi = [];

const fmtDate = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
const fmtLoc  = s => (s||'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
const cap = s => s ? s[0].toUpperCase()+s.slice(1) : '';

// ── Load tags.json then build ─────────────────────────────────────────
fetch('./tags.json?t='+Date.now())
  .then(r=>r.json())
  .then(data => { tags=data; init(); })
  .catch(() => {
    // fallback: build with empty tag data
    FILES.forEach(f=>tags[f]={file:f,date:'',location:'',city:'',city_label:'',people:[],tags:[],rating:0,caption:'',keep:null});
    init();
  });

function init() {
  document.getElementById('loading').style.display='none';
  buildStats();
  buildControls();
  buildGrid();
  af();
}

function buildStats() {
  const kept = FILES.filter(f=>(tags[f]||{}).keep===true).length;
  const withPpl = FILES.filter(f=>((tags[f]||{}).people||[]).length>0).length;
  const days = new Set(FILES.map(f=>(tags[f]||{}).date?.slice(0,10)).filter(Boolean)).size;
  document.getElementById('stats-row').innerHTML = [
    [FILES.length,'Photos'],[days,'Days'],['13','Destinations'],[kept||'—','In album']
  ].map(([v,l])=>`<div class="stat"><span>${v}</span><small>${l}</small></div>`).join('');
}

function buildControls() {
  // Collect unique values
  const cities = new Set(), tagSet = new Set();
  FILES.forEach(f=>{
    const t=tags[f]||{};
    if(t.city) cities.add(t.city);
    (t.tags||[]).forEach(x=>tagSet.add(x));
  });

  // People filter
  const pplEl = document.getElementById('ctrl-people');
  pplEl.innerHTML = '';
  [['all','Everyone'],...PPL.map(p=>[p,cap(p)]),['none','Scenic only']].forEach(([v,l])=>{
    const b=document.createElement('span');b.className='fb'+(v==='all'?' on':'');b.dataset.g='people';b.dataset.v=v;
    b.textContent=l; b.addEventListener('click',()=>setF('people',v,b)); pplEl.appendChild(b);
  });

  // Location filter
  const locEl = document.getElementById('ctrl-location');
  locEl.innerHTML = '';
  const allLocBtn = document.createElement('span');
  allLocBtn.className='fb on'; allLocBtn.dataset.g='city'; allLocBtn.dataset.v='all';
  allLocBtn.textContent='All locations'; allLocBtn.addEventListener('click',()=>setF('city','all',allLocBtn));
  locEl.appendChild(allLocBtn);
  [...cities].sort().forEach(c=>{
    const b=document.createElement('span');b.className='fb';b.dataset.g='city';b.dataset.v=c;
    b.textContent=CITY_MAP[c]||cap(c); b.addEventListener('click',()=>setF('city',c,b)); locEl.appendChild(b);
  });

  // Tags filter
  const tagEl = document.getElementById('ctrl-tags');
  tagEl.innerHTML = '';
  if(tagSet.size>0){
    const allTagBtn=document.createElement('span');allTagBtn.className='fb on';allTagBtn.dataset.g='tag';allTagBtn.dataset.v='all';
    allTagBtn.textContent='All tags'; allTagBtn.addEventListener('click',()=>setF('tag','all',allTagBtn));
    tagEl.appendChild(allTagBtn);
    [...tagSet].sort().forEach(t=>{
      const b=document.createElement('span');b.className='fb';b.dataset.g='tag';b.dataset.v=t;
      b.textContent=t; b.addEventListener('click',()=>setF('tag',t,b)); tagEl.appendChild(b);
    });
    // Album filter
    const sepEl=document.createElement('span');sepEl.className='sep';tagEl.appendChild(sepEl);
    [['all','All'],['keep','✓ In album'],['skip','✗ Skipped']].forEach(([v,l])=>{
      const b=document.createElement('span');b.className='fb'+(v==='all'?' on':'');b.dataset.g='album';b.dataset.v=v;
      b.textContent=l; b.addEventListener('click',()=>setF('album',v,b)); tagEl.appendChild(b);
    });
  }
}

function setF(group, val, el) {
  document.querySelectorAll(`.fb[data-g="${group}"]`).forEach(x=>x.classList.remove('on'));
  el.classList.add('on'); fState[group]=val; af();
}

// ── Grid ──────────────────────────────────────────────────────────────
function buildGrid() {
  const g=document.getElementById('grid'); g.innerHTML=''; gi=[];
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting&&e.target.dataset.src){e.target.src=e.target.dataset.src;delete e.target.dataset.src;obs.unobserve(e.target);}});
  },{rootMargin:'300px'});

  FILES.forEach((f,i)=>{
    const t=tags[f]||{};
    const loc=fmtLoc(t.location);
    const ppl=(t.people||[]).map(cap).join(', ');
    const tArr=t.tags||[];
    const el=document.createElement('div');el.className='gi';el.dataset.i=i;
    el.innerHTML=`<img alt="">
      <div class="gi-ov">
        <div class="gi-loc">${loc}</div>
        ${ppl?`<div class="gi-ppl">${ppl}</div>`:''}
        ${tArr.length?`<div class="gi-tags">${tArr.slice(0,3).map(x=>`<span class="gi-tag">${x}</span>`).join('')}</div>`:''}
      </div>
      ${t.rating?`<div class="gi-stars">${'★'.repeat(t.rating)}</div>`:''}
      ${t.keep===true?`<div class="gi-kb">✓</div>`:''}`;
    const img=el.querySelector('img');
    img.dataset.src=`thumbs/${f.replace(/\.[^.]+$/,'.jpg')}`;
    obs.observe(img);
    img.addEventListener('load',()=>img.classList.add('ok'));
    img.addEventListener('error',()=>{img.classList.add('ok');img.style.background='#1a1a1a';});
    el.addEventListener('click',()=>openLB(i));
    g.appendChild(el); gi.push({el,f,i});
  });
}

// ── Filters ───────────────────────────────────────────────────────────
function af() {
  const q=document.getElementById('srch').value.toLowerCase();
  let vis=0;
  gi.forEach(({el,f})=>{
    const t=tags[f]||{};
    const pArr=t.people||[], tArr=t.tags||[];
    const ok=
      (fState.people==='all'||(fState.people==='none'&&pArr.length===0)||pArr.includes(fState.people))&&
      (fState.city==='all'||t.city===fState.city)&&
      (fState.tag==='all'||tArr.includes(fState.tag))&&
      (fState.album==='all'||(fState.album==='keep'&&t.keep===true)||(fState.album==='skip'&&t.keep===false))&&
      (!q||f.toLowerCase().includes(q)||(t.location||'').includes(q)||(t.caption||'').toLowerCase().includes(q)||tArr.some(x=>x.includes(q)));
    el.classList.toggle('hidden',!ok);
    if(ok)vis++;
  });
  document.getElementById('cnt').textContent=vis+' photo'+(vis!==1?'s':'');
  document.getElementById('empty-msg').style.display=vis===0?'block':'none';
}

// ── Grid size ─────────────────────────────────────────────────────────
function setSize(s){
  document.getElementById('grid').classList.toggle('large',s==='lg');
  document.getElementById('sz-sm').classList.toggle('on',s==='sm');
  document.getElementById('sz-lg').classList.toggle('on',s==='lg');
}

// ── Lightbox ──────────────────────────────────────────────────────────
function visList(){return gi.filter(({el})=>!el.classList.contains('hidden')).map(({f,i})=>({f,i}));}

function openLB(fileIdx) {
  const v=visList(), pos=v.findIndex(x=>x.i===fileIdx);
  if(pos<0)return; selIdx=pos; showLB(v); document.getElementById('lb').classList.add('open'); document.body.style.overflow='hidden';
}
function closeLB(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
function navLB(d){const v=visList();selIdx=(selIdx+d+v.length)%v.length;showLB(v);}

function showLB(v){
  if(!v)v=visList();
  const {f}=v[selIdx];
  const t=tags[f]||{};
  const img=document.getElementById('lb-img');
  img.style.opacity='0'; img.src=`photos/${f.replace(/\.[^.]+$/,'.jpg')}`;
  document.getElementById('lb-loc').textContent=fmtLoc(t.location);
  document.getElementById('lb-ppl').textContent=(t.people||[]).map(cap).join(', ');
  document.getElementById('lb-date').textContent=t.date?fmtDate(t.date):'';
  document.getElementById('lb-cnt').textContent=(selIdx+1)+' / '+v.length;
  document.getElementById('lb-tags').innerHTML=(t.tags||[]).map(x=>`<span class="lb-tag">${x}</span>`).join('');
  document.getElementById('lb-cap').textContent=t.caption||'';
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  else if(e.key==='ArrowLeft')navLB(-1);
  else if(e.key==='ArrowRight')navLB(1);
});
let tx=null;
document.getElementById('lb').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('lb').addEventListener('touchend',e=>{if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)navLB(dx<0?1:-1);tx=null;},{passive:true});
document.getElementById('lb').addEventListener('click',e=>{if(e.target===document.getElementById('lb'))closeLB();});
</script>
</body>
</html>
