<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bafna Family — Travel Gallery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surf:#1a1a1a;--bdr:#2e2e2e;--txt:#f0f0f0;--mut:#888;--acc:#e8c97c;--tr:.22s ease}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.hdr{max-width:1100px;margin:0 auto;padding:3rem 2rem 2rem}
.hdr h1{font-size:2.2rem;font-weight:600;color:#fff}
.hdr h1 span{color:var(--acc)}
.hdr p{color:var(--mut);margin-top:.5rem;font-size:.95rem;line-height:1.6;max-width:480px}
.trips{max-width:1100px;margin:0 auto;padding:0 2rem 5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.4rem}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;transition:transform var(--tr),border-color var(--tr);display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);border-color:#444}
.thumb{position:relative;aspect-ratio:4/3;overflow:hidden;background:#111}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s,opacity .4s;opacity:0}
.thumb img.ok{opacity:1}
.card:hover .thumb img{transform:scale(1.04)}
.thumb .badge{position:absolute;bottom:.7rem;left:.7rem;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;padding:.25rem .65rem;border-radius:100px}
.body{padding:1rem 1.2rem 1.3rem;flex:1;display:flex;flex-direction:column;gap:.45rem}
.flag{font-size:1.25rem}
.title{font-size:1.05rem;font-weight:500;color:#fff}
.meta{font-size:.75rem;color:var(--mut);line-height:1.5}
.foot{margin-top:auto;padding-top:.8rem;display:flex;align-items:center;justify-content:space-between}
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--acc);color:#0f0f0f;font-weight:500;font-size:.8rem;padding:.45rem 1rem;border-radius:7px;transition:opacity var(--tr)}
.btn:hover{opacity:.85}
.btn svg{width:13px;height:13px}
.count{font-size:.72rem;color:var(--mut)}
.card.soon{opacity:.4;pointer-events:none}
.card.soon .thumb{background:repeating-linear-gradient(45deg,#1a1a1a,#1a1a1a 10px,#161616 10px,#161616 20px)}
.card.soon .thumb::after{content:"Coming soon";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:.82rem}
.footer{text-align:center;padding:1.5rem;color:var(--mut);font-size:.75rem;border-top:1px solid var(--bdr)}
</style>
</head>
<body>
<div class="hdr">
  <h1>Bafna Family <span>Travels</span></h1>
  <p>Photo galleries from our adventures. Click any trip to explore.</p>
</div>
<div class="trips">
  <a class="card" href="uk-trip-2026/">
    <div class="thumb">
      <img src="uk-trip-2026/thumbs/20260505-london-parliament-square-westminster-namrata-ansh-samyra-01.jpg" alt="UK Trip 2026" loading="lazy">
      <span class="badge">May 2026</span>
    </div>
    <div class="body">
      <div class="flag">🇬🇧</div>
      <div class="title">UK Trip 2026</div>
      <div class="meta">19 days · May 3–21, 2026<br>London · Edinburgh · Lake District · Inverness · more</div>
      <div class="foot">
        <span class="btn">View gallery <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg></span>
        <span class="count">334 photos</span>
      </div>
    </div>
  </a>
  <div class="card soon"><div class="thumb"></div><div class="body"><div class="flag">🗺️</div><div class="title">Next adventure</div></div></div>
  <div class="card soon"><div class="thumb"></div><div class="body"><div class="flag">🗺️</div><div class="title">Next adventure</div></div></div>
</div>
<div class="footer">Bafna Family Travel Gallery</div>
<script>
document.querySelectorAll('.thumb img').forEach(img=>{img.addEventListener('load',()=>img.classList.add('ok'));img.addEventListener('error',()=>img.classList.add('ok'));});
</script>
</body>
</html>
